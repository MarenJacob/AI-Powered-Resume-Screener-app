{% extends "auth/auth_base.html" %}

{% block content %}

<div class="auth-wrapper">

    <!-- LEFT PANEL -->

    <div class="auth-left">

        <img
            src="{{ url_for('static',
            filename='images/auth-bg.jpg') }}"
    
            class="auth-image">
    
    </div>

    <!-- RIGHT PANEL -->

    <div class="auth-right">

        <div class="glass-card auth-form">

            <h2 class="form-title">

                Welcome Back

            </h2>

            <p class="form-subtitle">

                Sign in to your account

            </p>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    placeholder="Email Address"
                    class="input-dark w-full p-4 rounded-xl mb-4">

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    class="input-dark w-full p-4 rounded-xl mb-6">

                <button
                    class="bg-cyan-500 hover:bg-cyan-400 w-full p-4 rounded-xl text-lg font-semibold">

                    Login

                </button>

            </form>

            <div class="auth-footer">

                Don't have an account?

                <a href="{{ url_for('auth.register') }}">

                    Register

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
