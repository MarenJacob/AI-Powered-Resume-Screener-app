{% extends "auth/auth_base.html" %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-left">

        <img
            src="{{ url_for('static',
            filename='images/auth-bg.jpg') }}"

            class="auth-image">

    </div>
    <div class="auth-right">

        <div class="glass-card auth-form">

            <h2 class="form-title">

                Request Access

            </h2>

            <p class="form-subtitle">

                Tell us about your company. Our team reviews every
                request before access is granted.

            </p>

            <form method="POST">

                <input
                    type="text"
                    name="company_name"
                    placeholder="Company Name"
                    required
                    class="input-dark w-full p-4 rounded-xl mb-4">

                <input
                    type="text"
                    name="contact_name"
                    placeholder="Your Full Name"
                    required
                    class="input-dark w-full p-4 rounded-xl mb-4">

                <input
                    type="email"
                    name="contact_email"
                    placeholder="Work Email Address"
                    required
                    class="input-dark w-full p-4 rounded-xl mb-4">

                <select
                    name="company_size"
                    class="input-dark w-full p-4 rounded-xl mb-4">

                    <option value="">Company Size</option>
                    <option value="1-10">1–10 employees</option>
                    <option value="11-50">11–50 employees</option>
                    <option value="51-200">51–200 employees</option>
                    <option value="201-1000">201–1000 employees</option>
                    <option value="1000+">1000+ employees</option>

                </select>

                <textarea
                    name="hiring_needs"
                    placeholder="What are you hiring for? (optional)"
                    rows="3"
                    class="input-dark w-full p-4 rounded-xl mb-6"></textarea>

                <button
                    class="bg-cyan-500 hover:bg-cyan-400 w-full p-4 rounded-xl text-lg font-semibold">

                    Submit Request

                </button>

            </form>

            <div class="auth-footer">

                Already approved?

                <a href="{{ url_for('auth.login') }}">

                    Log in

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
