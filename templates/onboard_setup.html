{% extends "auth/auth_base.html" %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-left">

        <img
            src="{{ url_for('static',
            filename='images/auth-bg.jpg') }}"

            class="auth-image">

    </div>
    <div class="auth-right">

        <div class="glass-card auth-form">

            <h2 class="form-title">

                Welcome to TalentEon AI

            </h2>

            <p class="form-subtitle">

                {{ company.name }} has been approved. Set a password
                to activate your account.

            </p>

            <form method="POST">

                <input
                    type="text"
                    name="full_name"
                    value="{{ invite.full_name or '' }}"
                    placeholder="Full Name"
                    required
                    class="input-dark w-full p-4 rounded-xl mb-4">

                <input
                    type="email"
                    value="{{ invite.email }}"
                    disabled
                    class="input-dark w-full p-4 rounded-xl mb-4 opacity-60">

                <input
                    type="password"
                    name="password"
                    placeholder="Create Password"
                    required
                    class="input-dark w-full p-4 rounded-xl mb-4">

                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm Password"
                    required
                    class="input-dark w-full p-4 rounded-xl mb-6">

                <button
                    class="bg-cyan-500 hover:bg-cyan-400 w-full p-4 rounded-xl text-lg font-semibold">

                    Activate Account

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
